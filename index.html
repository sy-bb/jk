<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矿场监控中心</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d14;--bg1:#0b1520;--bg2:#0f1e2d;--bg3:#152638;
  --border:rgba(0,200,120,.1);--border2:rgba(0,200,120,.22);
  --green:#00e87a;--green2:#00ff88;--gd:rgba(0,232,122,.14);
  --amber:#ffaa00;--ad:rgba(255,170,0,.14);
  --red:#ff4455;--rd:rgba(255,68,85,.14);
  --blue:#38aaff;--bd:rgba(56,170,255,.12);
  --text:#c8e8d8;--text2:#6a9e82;--text3:#3a6a52;
  --mono:'JetBrains Mono','Consolas',monospace;--r:6px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;background-image:linear-gradient(rgba(0,232,122,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,232,122,.018) 1px,transparent 1px);background-size:36px 36px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:380px;background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:36px 32px}
.login-logo{text-align:center;margin-bottom:6px}
.login-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green2);box-shadow:0 0 16px var(--green2);display:inline-block;margin-right:8px;animation:pulse 2s infinite}
.login-logo-text{font-size:18px;font-weight:700;color:var(--green2);letter-spacing:.06em}
.login-sub{color:var(--text3);font-size:12px;text-align:center;margin-top:4px;margin-bottom:28px}
.lbl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block}
.inp{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;outline:none;transition:border .15s;margin-bottom:14px}
.inp:focus{border-color:var(--green)}
.btn-login{width:100%;padding:10px;background:var(--green);border:none;border-radius:var(--r);color:#000;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.04em}
.btn-login:hover{background:var(--green2)}
.btn-login:disabled{opacity:.5;cursor:default}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
#app{display:none}
.hdr{position:sticky;top:0;z-index:100;background:rgba(7,13,20,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border2);padding:0 20px;height:54px;display:flex;align-items:center;gap:16px}
.hdr-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--green2);white-space:nowrap}
.hdr-logo::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green2);box-shadow:0 0 10px var(--green2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.hdr-sep{width:1px;height:26px;background:var(--border2)}
.hdr-kpi{display:flex;flex-direction:column;gap:1px}
.hdr-kpi-l{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.hdr-kpi-v{font-size:13px;font-weight:700;font-family:var(--mono)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}.btn-red:hover{background:var(--rd)}
.btn-amber{border-color:var(--amber);color:var(--amber)}.btn-amber:hover{background:var(--ad)}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:var(--gd)}
.btn-blue{border-color:var(--blue);color:var(--blue)}.btn-blue:hover{background:var(--bd)}
.rbtn{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:var(--green);color:var(--green)}
.rbtn.spinning .ri{animation:spin .6s linear infinite}
.btc-live{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue)}
.user-tag{font-size:11px;color:var(--text3)}
.alert-bar{display:none;align-items:center;gap:10px;padding:7px 20px;background:rgba(255,68,85,.08);border-bottom:1px solid rgba(255,68,85,.3);font-size:12px;color:var(--red)}
.alert-bar.on{display:flex}
.main{padding:18px 20px;max-width:1600px;margin:0 auto}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--green);opacity:.25}
.sc.warn::after{background:var(--amber)}.sc.err::after{background:var(--red);opacity:.5}
.sl{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.sv{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--green2);line-height:1}
.sv.warn{color:var(--amber)}.sv.err{color:var(--red)}.sv.blue{color:var(--blue)}
.ss{font-size:10px;color:var(--text2);margin-top:3px}
.sec{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;margin-bottom:24px}
.dc{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.dc:hover{border-color:var(--border2)}.dc.err-c{border-color:rgba(255,68,85,.35)}
.dhd{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dst{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dst.online{background:var(--green2);box-shadow:0 0 8px var(--green2)}
.dst.offline{background:var(--red)}.dst.warning{background:var(--amber);animation:pulse 1s infinite}
.dn{font-weight:700;font-size:13px;color:var(--text)}
.dip{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:auto}
.dut{font-size:10px;color:var(--text3);margin-left:6px}
.dmets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)}
.dmet{background:var(--bg1);padding:9px 12px}
.dml{font-size:9px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.dmv{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text)}
.dmv.g{color:var(--green2)}.dmv.a{color:var(--amber)}.dmv.r{color:var(--red)}
.dpool{padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pname{color:var(--text);font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dact{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.dact .btn{font-size:11px;padding:4px 9px}
.clog{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.clhd{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;justify-content:space-between}
.ctbl{width:100%;border-collapse:collapse;font-size:11px}
.ctbl th{padding:7px 12px;text-align:left;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
.ctbl td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.ctbl tr:last-child td{border-bottom:none}.ctbl tr:hover td{background:rgba(0,200,120,.03)}
.sbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.sbadge.pending{background:var(--ad);color:var(--amber)}.sbadge.running{background:var(--bd);color:var(--blue)}.sbadge.done{background:var(--gd);color:var(--green)}.sbadge.error{background:var(--rd);color:var(--red)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.mo.on{display:flex}
.md{background:var(--bg1);border:1px solid var(--border2);border-radius:10px;padding:22px;width:440px;max-width:94vw;max-height:85vh;overflow-y:auto}
.mtit{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--green2);display:flex;align-items:center;justify-content:space-between}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:11px;color:var(--text2)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.mc{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 4px}
.mc:hover{color:var(--text)}
.empty{grid-column:1/-1;text-align:center;padding:48px;color:var(--text3);font-size:13px}
.esp{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.warn-box{font-size:11px;color:var(--amber);padding:8px 12px;background:var(--ad);border-radius:var(--r);margin-bottom:12px}
@media(max-width:900px){.summary{grid-template-columns:repeat(3,1fr)}.hdr-kpi:nth-child(n+4){display:none}}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr)}.dgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-logo-dot"></span>
      <span class="login-logo-text">矿场监控中心</span>
    </div>
    <div class="login-sub">现场设备监控与远程控制系统</div>
    <label class="lbl">登录邮箱</label>
    <input class="inp" id="l-email" type="email" placeholder="your@email.com" autocomplete="username">
    <label class="lbl">密码</label>
    <input class="inp" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-login" id="btn-login" onclick="doLogin()">登 录</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-logo">矿场监控中心</div>
    <div class="hdr-sep"></div>
    <div class="hdr-kpi"><div class="hdr-kpi-l">在运</div><div class="hdr-kpi-v" id="h-online" style="color:var(--green2)">—</div></div>
    <div class="hdr-sep"></div>
    <div class="hdr-kpi"><div class="hdr-kpi-l">总算力</div><div class="hdr-kpi-v" id="h-hr">— TH/s</div></div>
    <div class="hdr-sep"></div>
    <div class="hdr-kpi"><div class="hdr-kpi-l">BTC价格</div><div class="btc-live" id="h-price">—</div></div>
    <div class="hdr-r">
      <div class="rbtn" id="btn-ref" onclick="refreshAll()"><span class="ri">⟳</span><span id="rcd">30s</span></div>
      <span class="user-tag" id="utag">—</span>
      <button class="btn btn-red" onclick="doLogout()" style="font-size:11px;padding:4px 10px">退出</button>
    </div>
  </div>

  <div class="alert-bar" id="abar"><span>⚠</span><span id="amsg"></span></div>

  <div class="main">
    <div class="summary">
      <div class="sc"><div class="sl">总矿机</div><div class="sv" id="s-total">—</div><div class="ss" id="s-sub">—</div></div>
      <div class="sc" id="s-wc"><div class="sl">告警/离线</div><div class="sv" id="s-warn">—</div><div class="ss">需要关注</div></div>
      <div class="sc"><div class="sl">总算力</div><div class="sv g" id="s-hr">—</div><div class="ss">TH/s</div></div>
      <div class="sc"><div class="sl">平均温度</div><div class="sv" id="s-temp">—</div><div class="ss">°C 主板</div></div>
      <div class="sc"><div class="sl">数据更新</div><div class="sv blue" id="s-upd" style="font-size:13px">—</div><div class="ss">Agent最后上报</div></div>
    </div>

    <div class="sec">矿机设备状态</div>
    <div class="dgrid" id="dgrid"><div class="empty"><div class="esp"></div>正在加载设备数据…</div></div>

    <div class="sec">指令执行记录</div>
    <div class="clog">
      <div class="clhd">最近20条指令 <button class="btn" onclick="loadCmdLog()" style="font-size:11px;padding:3px 9px">刷新</button></div>
      <div style="overflow-x:auto">
        <table class="ctbl">
          <thead><tr><th>时间</th><th>矿机</th><th>指令</th><th>参数</th><th>状态</th><th>结果</th><th>操作人</th></tr></thead>
          <tbody id="ctbody"><tr><td colspan="7" style="text-align:center;color:var(--text3);padding:20px">暂无记录</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 切换矿池 -->
<div class="mo" id="m-pool">
  <div class="md">
    <div class="mtit">切换矿池 <button class="mc" onclick="closeM('m-pool')">✕</button></div>
    <div class="fg"><label class="fl">目标矿机</label><input class="inp" id="p-box" readonly></div>
    <div class="fg"><label class="fl">矿池1 URL *</label><input class="inp" id="p-url1" placeholder="stratum+tcp://btc.antpool.com:3333"></div>
    <div class="fg"><label class="fl">矿池1 账号 *</label><input class="inp" id="p-user1" placeholder="account.worker1"></div>
    <div class="fg"><label class="fl">矿池1 密码</label><input class="inp" id="p-pass1" placeholder="留空或填123"></div>
    <div class="fg"><label class="fl">矿池2 URL（备用）</label><input class="inp" id="p-url2"></div>
    <div class="fg"><label class="fl">矿池2 账号</label><input class="inp" id="p-user2"></div>
    <div class="mf">
      <button class="btn" onclick="closeM('m-pool')">取消</button>
      <button class="btn btn-blue" onclick="sendSetPool()">确认切换</button>
    </div>
  </div>
</div>

<!-- 功耗设置 -->
<div class="mo" id="m-power">
  <div class="md">
    <div class="mtit">功耗 / 频率设置 <button class="mc" onclick="closeM('m-power')">✕</button></div>
    <div class="fg"><label class="fl">目标矿机</label><input class="inp" id="pw-box" readonly></div>
    <div class="fg"><label class="fl">功耗模式</label>
      <select class="inp" id="pw-mode">
        <option value="">— 不修改 —</option>
        <option value="high">高性能（超频）</option>
        <option value="normal">标准模式</option>
        <option value="low">低功耗</option>
        <option value="sleep">睡眠模式</option>
      </select>
    </div>
    <div class="fg"><label class="fl">频率 MHz（留空=不修改）</label><input class="inp" id="pw-freq" type="number" placeholder="如：600"></div>
    <div class="warn-box">⚠ 超频可能导致矿机过热，请谨慎操作</div>
    <div class="mf">
      <button class="btn" onclick="closeM('m-power')">取消</button>
      <button class="btn btn-amber" onclick="sendSetPower()">确认设置</button>
    </div>
  </div>
</div>

<!-- 确认弹窗 -->
<div class="mo" id="m-confirm">
  <div class="md" style="width:360px">
    <div class="mtit" id="cf-title">确认操作 <button class="mc" onclick="closeM('m-confirm')">✕</button></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px;white-space:pre-line" id="cf-msg"></div>
    <div class="mf">
      <button class="btn" onclick="closeM('m-confirm')">取消</button>
      <button class="btn" id="cf-ok">确认</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://eoachvacnhcjxejwoiqs.supabase.co';
const SB_KEY='sb_publishable_dodNrHRcVxd0b7Q0mf7Cqw_-c1Um-uY';
let _tok='',_email='',_cd=30,_ct=null;

const H=()=>({'apikey':SB_KEY,'Authorization':`Bearer ${_tok||SB_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'});

async function sbGet(path){const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:H()});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('btn-login');
  if(!email||!pass){err.textContent='请填写邮箱和密码';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='登录中…';err.style.display='none';
  try{
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password:pass})
    });
    const d=await r.json();
    if(d.access_token){
      _tok=d.access_token;_email=email;
      document.getElementById('login-page').style.display='none';
      document.getElementById('app').style.display='';
      document.getElementById('utag').textContent=email;
      refreshAll();startCd();fetchPrice();setInterval(fetchPrice,60000);
    }else{err.textContent=d.error_description||'邮箱或密码错误';err.style.display='block';}
  }catch(e){err.textContent='网络错误';err.style.display='block';}
  btn.disabled=false;btn.textContent='登 录';
}
function doLogout(){_tok='';clearInterval(_ct);document.getElementById('app').style.display='none';document.getElementById('login-page').style.display='flex';}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function startCd(){clearInterval(_ct);_cd=30;_ct=setInterval(()=>{_cd--;const el=document.getElementById('rcd');if(el)el.textContent=_cd+'s';if(_cd<=0){refreshAll();_cd=30;}},1000);}

async function refreshAll(){
  const btn=document.getElementById('btn-ref');btn.classList.add('spinning');
  try{await Promise.all([loadDevices(),loadCmdLog()]);}catch(e){}
  btn.classList.remove('spinning');_cd=30;const el=document.getElementById('rcd');if(el)el.textContent='30s';
}

async function loadDevices(){
  let rows;
  try{rows=await sbGet('device_status?order=box_name.asc');}
  catch(e){document.getElementById('dgrid').innerHTML=`<div class="empty">加载失败：${e.message}</div>`;return;}
  updateSummary(rows);renderDevices(rows);
}

function updateSummary(rows){
  const on=rows.filter(r=>r.online),off=rows.filter(r=>!r.online);
  const hr=on.reduce((s,r)=>s+(r.hashrate||0),0);
  const temps=on.map(r=>r.temp_board).filter(Boolean);
  const avgT=temps.length?(temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1):'—';
  const lastTs=rows.map(r=>r.updated_at).filter(Boolean).sort().pop();
  const lastStr=lastTs?new Date(lastTs).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  const q=id=>document.getElementById(id);
  q('s-total').textContent=rows.length;q('s-sub').textContent=`在线${on.length} / 离线${off.length}`;
  q('s-warn').textContent=off.length;q('s-warn').className='sv '+(off.length?'err':'');q('s-wc').className='sc '+(off.length?'err':'');
  q('s-hr').textContent=hr.toFixed(2);
  q('s-temp').textContent=avgT;q('s-temp').className='sv '+(parseFloat(avgT)>80?'r':parseFloat(avgT)>70?'a':'');
  q('s-upd').textContent=lastStr;q('h-online').textContent=`${on.length}/${rows.length}`;q('h-hr').textContent=hr.toFixed(2)+' TH/s';
  const abar=q('abar'),amsg=q('amsg');
  if(off.length){amsg.textContent=`${off.length}台矿机离线：`+off.map(r=>r.box_name||r.box_ip).join(', ');abar.classList.add('on');}
  else{abar.classList.remove('on');}
}

function fmtUp(s){if(!s)return'—';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>=24?`${Math.floor(h/24)}天${h%24}时`:`${h}时${m}分`;}

function renderDevices(rows){
  const g=document.getElementById('dgrid');
  if(!rows.length){g.innerHTML='<div class="empty">暂无设备数据<br><small style="color:var(--text3)">请确认现场Agent已启动</small></div>';return;}
  g.innerHTML=rows.map(r=>{
    const st=r.online?'online':'offline';
    const tc=r.temp_board>80?'r':r.temp_board>70?'a':'g';
    const pu=(r.pool_user||'—').replace(/^[^.]*\./,'');
    return `<div class="dc ${r.online?'':'err-c'}">
      <div class="dhd">
        <span class="dst ${st}"></span>
        <span class="dn">${r.box_name||r.box_ip}</span>
        <span class="dip">${r.box_ip}</span>
        <span class="dut">${fmtUp(r.uptime_sec)}</span>
      </div>
      <div class="dmets">
        <div class="dmet"><div class="dml">算力</div><div class="dmv ${r.online?'g':'r'}">${r.online?(r.hashrate||0).toFixed(2):'—'}</div><div class="dml">TH/s</div></div>
        <div class="dmet"><div class="dml">温度</div><div class="dmv ${r.online?tc:'r'}">${r.online&&r.temp_board?r.temp_board.toFixed(1)+'°C':'—'}</div><div class="dml">主板</div></div>
        <div class="dmet"><div class="dml">风扇</div><div class="dmv">${r.online&&r.fan_speed?r.fan_speed:'—'}</div><div class="dml">${r.power_mode||'RPM'}</div></div>
      </div>
      <div class="dpool">
        <span class="pdot" style="background:${r.online?'var(--green)':'var(--red)'}"></span>
        <span class="pname" title="${r.pool_user||''}">${pu}</span>
        <span style="color:var(--text3);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px" title="${r.pool_url||''}">${(r.pool_url||'—').replace('stratum+tcp://','')}</span>
      </div>
      <div class="dact">
        <button class="btn btn-amber" onclick="cfmAct('reboot','${r.box_ip}','${r.box_name||r.box_ip}')">⟳ 重启</button>
        <button class="btn btn-blue" onclick="openPool('${r.box_ip}','${r.box_name||r.box_ip}','${(r.pool_url||'').replace(/'/g,"\\'")}','${(r.pool_user||'').replace(/'/g,"\\'")}')">矿池</button>
        <button class="btn btn-green" onclick="openPower('${r.box_ip}','${r.box_name||r.box_ip}','${r.power_mode||''}')">功耗</button>
        <button class="btn btn-red" onclick="cfmAct('poweroff','${r.box_ip}','${r.box_name||r.box_ip}')">关机</button>
      </div>
    </div>`;
  }).join('');
}

async function loadCmdLog(){
  try{
    const rows=await sbGet('device_commands?order=created_at.desc&limit=20');
    const tb=document.getElementById('ctbody');
    if(!rows.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:16px">暂无记录</td></tr>';return;}
    const CMDS={reboot:'重启',poweroff:'关机',set_pool:'切换矿池',set_power_mode:'功耗模式',set_freq:'频率'};
    const STLBL={pending:'待执行',running:'执行中',done:'成功',error:'失败'};
    tb.innerHTML=rows.map(r=>{
      const t=new Date(r.created_at).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const p=r.params?JSON.stringify(r.params):'—';
      return `<tr>
        <td style="font-family:var(--mono);font-size:10px;color:var(--text2)">${t}</td>
        <td><strong>${r.box_name||r.box_ip}</strong><br><span style="color:var(--text3);font-size:10px;font-family:var(--mono)">${r.box_ip}</span></td>
        <td>${CMDS[r.command]||r.command}</td>
        <td style="font-size:10px;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p}">${p}</td>
        <td><span class="sbadge ${r.status}">${STLBL[r.status]||r.status}</span></td>
        <td style="font-size:10px;color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.result||''}">${r.result||'—'}</td>
        <td style="font-size:10px;color:var(--text3)">${r.operator||'—'}</td>
      </tr>`;
    }).join('');
  }catch(e){}
}

async function sendCmd(box_ip,box_name,command,params={}){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/device_commands`,{
      method:'POST',headers:{...H(),'Prefer':'return=minimal'},
      body:JSON.stringify({box_ip,box_name,command,params,operator:_email,status:'pending'})
    });
    if(r.ok||r.status===201){setTimeout(loadCmdLog,2000);return true;}
  }catch(e){}
  alert('发送指令失败');return false;
}

function cfmAct(cmd,ip,name){
  const cfg={
    reboot:{title:'确认重启',msg:`即将重启矿机 ${name}（${ip}）\n矿机将停止运算约2~5分钟`,cls:'btn-amber',lbl:'确认重启'},
    poweroff:{title:'确认关机',msg:`即将关闭矿机 ${name}（${ip}）\n关机后需手动开机才能恢复`,cls:'btn-red',lbl:'确认关机'}
  }[cmd];
  document.getElementById('cf-title').childNodes[0].textContent=cfg.title+' ';
  document.getElementById('cf-msg').textContent=cfg.msg;
  const ok=document.getElementById('cf-ok');ok.className=`btn ${cfg.cls}`;ok.textContent=cfg.lbl;
  ok.onclick=async()=>{closeM('m-confirm');await sendCmd(ip,name,cmd);};
  openM('m-confirm');
}

function openPool(ip,name,curUrl,curUser){
  document.getElementById('p-box').value=`${name}（${ip}）`;
  document.getElementById('p-url1').value=curUrl||'';document.getElementById('p-user1').value=curUser||'';
  document.getElementById('p-pass1').value='';document.getElementById('p-url2').value='';document.getElementById('p-user2').value='';
  document.getElementById('m-pool').dataset.ip=ip;document.getElementById('m-pool').dataset.name=name;
  openM('m-pool');
}
async function sendSetPool(){
  const ip=document.getElementById('m-pool').dataset.ip,name=document.getElementById('m-pool').dataset.name;
  const url1=document.getElementById('p-url1').value.trim(),user1=document.getElementById('p-user1').value.trim();
  if(!url1||!user1){alert('请填写矿池1 URL和账号');return;}
  closeM('m-pool');
  await sendCmd(ip,name,'set_pool',{pool1_url:url1,pool1_user:user1,pool1_pass:document.getElementById('p-pass1').value,pool2_url:document.getElementById('p-url2').value,pool2_user:document.getElementById('p-user2').value});
}

function openPower(ip,name,curMode){
  document.getElementById('pw-box').value=`${name}（${ip}）`;
  document.getElementById('pw-mode').value=curMode||'';document.getElementById('pw-freq').value='';
  document.getElementById('m-power').dataset.ip=ip;document.getElementById('m-power').dataset.name=name;
  openM('m-power');
}
async function sendSetPower(){
  const ip=document.getElementById('m-power').dataset.ip,name=document.getElementById('m-power').dataset.name;
  const mode=document.getElementById('pw-mode').value,freq=document.getElementById('pw-freq').value;
  if(!mode&&!freq){alert('请选择功耗模式或填写频率');return;}
  closeM('m-power');
  if(mode)await sendCmd(ip,name,'set_power_mode',{mode});
  if(freq)await sendCmd(ip,name,'set_freq',{freq:parseInt(freq)});
}

function openM(id){document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}
window.addEventListener('click',e=>{if(e.target.classList.contains('mo'))e.target.classList.remove('on');});

async function fetchPrice(){
  try{const r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');const d=await r.json();const p=parseFloat(d.price);const el=document.getElementById('h-price');if(el)el.textContent='$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}catch(e){}
}
</script>
</body>
